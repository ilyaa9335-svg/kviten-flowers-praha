<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>KVITEN' — Flowers & Decor · Praha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#4a1f5c;
  --plum-deep:#36174a;
  --plum-soft:#7a4a8e;
  --cream:#faf5ee;
  --ivory:#f3ead8;
  --blush:#ecd8d2;
  --rose:#c9a3a0;
  --ink:#2a1e28;
  --ink-60:rgba(42,30,40,.62);
  --ink-40:rgba(42,30,40,.38);
  --rule:rgba(42,30,40,.18);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

/* ===== type ===== */
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.01em}
.display{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;line-height:.92}
.italic{font-style:italic}
.eyebrow{font-family:var(--sans);font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;font-weight:500;color:var(--ink-60)}
.smallcaps{font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:500}

/* ===== layout ===== */
.wrap{max-width:1320px;margin:0 auto;padding:0 28px}
.rule{height:1px;background:var(--rule);width:100%}
.vrule{width:1px;background:var(--rule);align-self:stretch}

/* ===== header ===== */
header.top{position:sticky;top:0;z-index:40;background:rgba(250,245,238,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--rule)}
.top-strip{display:flex;align-items:center;justify-content:space-between;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-60);padding:9px 28px;border-bottom:1px solid var(--rule)}
.top-strip a{display:inline-flex;align-items:center;gap:6px}
.top-strip .loc::before{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--plum);margin-right:7px;transform:translateY(-1px)}
.lang{display:inline-flex;gap:2px;align-items:center}
.lang button{padding:2px 7px;font-size:10.5px;letter-spacing:.18em;color:var(--ink-40);border-radius:2px;transition:color .15s}
.lang button.active{color:var(--plum);font-weight:600}
.lang button:hover{color:var(--plum)}
.lang .sep{color:var(--ink-40);font-size:9px}

.nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 28px;gap:20px}
.nav-left,.nav-right{display:flex;align-items:center;gap:28px}
.nav-right{justify-content:flex-end}
.nav a.nav-item{font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;color:var(--ink);position:relative;padding:6px 0}
.nav a.nav-item.active::after{content:"";position:absolute;left:50%;bottom:0;width:4px;height:4px;border-radius:50%;background:var(--plum);transform:translate(-50%,0)}
.nav a.nav-item:hover{color:var(--plum)}
.brand{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.brand .mark{font-family:var(--serif);font-weight:500;font-size:26px;letter-spacing:.04em;color:var(--plum);line-height:1}
.brand .sub{font-family:var(--serif);font-style:italic;font-size:11px;color:var(--plum-soft);letter-spacing:.04em}
.hbtn{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border:1px solid var(--plum);color:var(--plum);border-radius:999px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;transition:all .2s}
.hbtn:hover{background:var(--plum);color:var(--cream)}
.hbtn.filled{background:var(--plum);color:var(--cream)}
.hbtn.filled:hover{background:var(--plum-deep)}
.phone-pill{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.1em;color:var(--ink);white-space:nowrap}
.phone-pill .dot{width:6px;height:6px;border-radius:50%;background:#7cb28a;box-shadow:0 0 0 4px rgba(124,178,138,.18)}
.menu-btn{display:none}

@media (max-width:1200px){
  .nav-right .nav-secondary{display:none}
}
@media (max-width:1060px){
  .nav-left a.nav-item:nth-child(n+3){display:none}
  .hbtn.cta-head{display:none}
}
@media (max-width:1020px){
  .nav{grid-template-columns:auto 1fr auto;padding:14px 20px}
  .nav-left{display:none}
  .nav-right a.nav-item{display:none}
  .brand{align-items:flex-start}
  .brand .mark{font-size:22px}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid var(--rule);border-radius:50%}
  .menu-btn svg{width:16px;height:16px}
  .top-strip{padding:8px 16px;font-size:9.5px;letter-spacing:.14em;gap:8px;flex-wrap:nowrap;white-space:nowrap;overflow:hidden}
  .top-strip .loc{display:none}
  .hbtn.cta-head{display:none}
  .phone-pill{display:none}
}
@media (max-width:880px){
  .phone-pill{display:none}
}

/* ===== mobile drawer ===== */
.drawer{position:fixed;inset:0;background:var(--cream);z-index:80;opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-16px);transition:opacity .28s ease,transform .35s cubic-bezier(.7,0,.2,1),visibility 0s linear .35s;display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);transition:opacity .28s ease,transform .35s cubic-bezier(.7,0,.2,1),visibility 0s linear 0s}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--rule)}
.drawer-nav{padding:40px 28px;display:flex;flex-direction:column;gap:4px;flex:1}
.drawer-nav a{font-family:var(--serif);font-size:38px;line-height:1.2;color:var(--ink);border-bottom:1px solid var(--rule);padding:14px 0;display:flex;align-items:center;justify-content:space-between}
.drawer-nav a .n{font-family:var(--sans);font-size:10px;letter-spacing:.2em;color:var(--ink-40)}
.drawer-foot{padding:28px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:14px}

/* ===== hero ===== */
.hero{padding:40px 0 20px;position:relative}
.hero-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;align-items:stretch}
.hero-text{padding:30px 0 30px 0;display:flex;flex-direction:column;justify-content:space-between;min-height:640px}
.hero-meta{display:flex;align-items:center;gap:14px;color:var(--ink-60)}
.hero-meta .line{height:1px;width:44px;background:var(--ink-40)}
.hero h1{font-size:clamp(48px,6.8vw,118px);margin:24px 0 0 0}
.hero h1 .amp{color:var(--plum);font-style:italic;font-weight:300;display:inline-block;transform:translateY(.04em)}
.hero h1 .flourish{color:var(--plum-soft);font-style:italic;font-weight:300}
.hero-lede{max-width:460px;font-size:17px;color:var(--ink-60);margin-top:28px;line-height:1.55}
.hero-cta{display:flex;gap:12px;margin-top:32px;align-items:center;flex-wrap:wrap}
.hero-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule);margin-top:48px;padding-top:24px}
.kpi{display:flex;flex-direction:column;gap:4px;padding-right:16px}
.kpi .num{font-family:var(--serif);font-size:38px;color:var(--plum);line-height:1}
.kpi .lb{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-60)}

.hero-image{position:relative;overflow:hidden}
.hero-image .main{width:100%;height:100%;min-height:640px;object-fit:cover;object-position:center}
.hero-image::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(0,0,0,.18) 100%);pointer-events:none}
.hero-tag{position:absolute;left:22px;top:22px;background:rgba(250,245,238,.92);backdrop-filter:blur(6px);padding:10px 16px;border-radius:999px;display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.hero-tag .live{width:6px;height:6px;border-radius:50%;background:#c94a6e;box-shadow:0 0 0 5px rgba(201,74,110,.18)}
.hero-floating{position:absolute;right:22px;bottom:22px;background:var(--cream);padding:16px 18px;max-width:260px;border-radius:2px;box-shadow:0 30px 60px -30px rgba(0,0,0,.4)}
.hero-floating .price{font-family:var(--serif);font-size:22px;color:var(--plum)}
.hero-floating .ttl{font-family:var(--serif);font-size:18px;margin-top:2px}
.hero-floating .meta{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-60);margin-top:6px;display:flex;gap:8px;align-items:center}

@media (max-width:1020px){
  .hero-grid{grid-template-columns:1fr;gap:24px}
  .hero-text{min-height:auto;padding:10px 0}
  .hero-image .main{min-height:480px;height:auto}
  .hero-text{min-height:auto;padding:10px 0}
  .hero-kpis{margin-top:28px}
  .kpi .num{font-size:30px}
  .hero-floating{right:16px;bottom:16px;padding:12px 14px;max-width:180px}
  .hero-floating .ttl{font-size:14px}
  .hero-floating .price{font-size:18px}
}

/* ===== marquee ===== */
.marquee{border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:16px 0;overflow:hidden;background:var(--ivory);margin-top:24px}
.marquee-track{display:flex;gap:64px;white-space:nowrap;animation:slide 40s linear infinite;font-family:var(--serif);font-style:italic;font-size:22px;color:var(--plum)}
.marquee-track span{display:inline-flex;align-items:center;gap:64px}
.marquee-track .dot{width:6px;height:6px;border-radius:50%;background:var(--plum-soft);display:inline-block}
@keyframes slide{to{transform:translateX(-50%)}}

/* ===== section headers ===== */
.sec{padding:80px 0}
.sec-hd{display:grid;grid-template-columns:auto 1fr auto;align-items:end;gap:32px;margin-bottom:48px}
.sec-hd .n{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--plum-soft)}
.sec-hd .t{font-family:var(--serif);font-size:clamp(40px,5.5vw,76px);line-height:.95;letter-spacing:-.02em}
.sec-hd .t .em{font-style:italic;color:var(--plum);font-weight:300}
.sec-hd .side{max-width:280px;color:var(--ink-60);font-size:13px;text-align:right;border-top:1px solid var(--rule);padding-top:12px}
@media (max-width:880px){
  .sec{padding:56px 0}
  .sec-hd{grid-template-columns:1fr;gap:18px;margin-bottom:28px}
  .sec-hd .side{text-align:left;max-width:none}
}

/* ===== services grid ===== */
.svcs{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule)}
.svc{background:var(--cream);padding:32px 26px 28px;display:flex;flex-direction:column;gap:14px;min-height:320px;position:relative;transition:background .3s}
.svc:hover{background:var(--ivory)}
.svc .num{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--plum-soft)}
.svc .name{font-family:var(--serif);font-size:30px;line-height:1.02;margin-top:8px}
.svc .desc{color:var(--ink-60);font-size:13px;flex:1}
.svc .more{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--plum);display:inline-flex;align-items:center;gap:8px}
.svc .more .arrow{width:18px;height:1px;background:var(--plum);position:relative;display:inline-block}
.svc .more .arrow::after{content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;border-top:1px solid var(--plum);border-right:1px solid var(--plum);transform:rotate(45deg)}
@media (max-width:880px){.svcs{grid-template-columns:repeat(2,1fr)}.svc{min-height:240px;padding:22px 18px}.svc .name{font-size:22px}}

/* ===== gallery strip ===== */
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.strip .cell{position:relative;overflow:hidden;aspect-ratio:3/4;background:var(--ivory)}
.strip .cell img{width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.2,.7,.2,1)}
.strip .cell:hover img{transform:scale(1.04)}
.strip .cell.tall{grid-row:span 2;aspect-ratio:3/5}
.strip .cap{position:absolute;left:14px;bottom:14px;background:rgba(250,245,238,.95);padding:6px 10px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}
@media (max-width:880px){.strip{grid-template-columns:repeat(2,1fr);gap:10px}}

/* ===== editorial quote ===== */
.editorial{padding:100px 0;background:var(--plum);color:var(--cream);margin:80px 0 0}
.editorial .wrap{display:grid;grid-template-columns:auto 1fr;gap:60px;align-items:center}
.editorial .q{font-family:var(--serif);font-style:italic;font-size:clamp(28px,3.5vw,48px);line-height:1.2;font-weight:300}
.editorial .q .em{color:#e8c7dd}
.editorial .att{font-size:11px;letter-spacing:.24em;text-transform:uppercase;margin-top:32px;opacity:.7}
.editorial .logo-wheel{width:220px;height:220px;border:1px solid rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.editorial .logo-wheel .inner{width:150px;height:150px;border-radius:50%;overflow:hidden;background:var(--cream)}
.editorial .logo-wheel svg{position:absolute;inset:0;width:100%;height:100%;animation:spin 40s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:880px){.editorial{padding:60px 0;margin-top:40px}.editorial .wrap{grid-template-columns:1fr;gap:28px}.editorial .logo-wheel{width:150px;height:150px}.editorial .logo-wheel .inner{width:100px;height:100px}}

/* ===== instagram ===== */
.ig-hd{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px}
.ig-hd h3{font-family:var(--serif);font-size:42px}
.ig-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.ig-cell{aspect-ratio:1/1;overflow:hidden;position:relative;background:var(--ivory)}
.ig-cell img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.ig-cell:hover img{transform:scale(1.06)}
.ig-cell .ov{position:absolute;inset:0;background:rgba(74,31,92,.7);opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.ig-cell:hover .ov{opacity:1}
@media (max-width:880px){.ig-grid{grid-template-columns:repeat(3,1fr)}}

/* ===== footer ===== */
footer{background:var(--plum-deep);color:var(--cream);padding:80px 0 30px;margin-top:80px}
footer .fgrid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:48px;margin-bottom:56px}
footer h4{font-family:var(--serif);font-size:28px;font-weight:400;margin-bottom:18px}
footer .sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,245,238,.6);margin-bottom:14px;display:block}
footer p,footer a{font-size:14px;color:rgba(250,245,238,.82);line-height:1.7}
footer a:hover{color:#e8c7dd}
footer ul{list-style:none}
footer .map{aspect-ratio:4/3;background:#2a1040;border-radius:2px;overflow:hidden;margin-top:8px;position:relative}
footer .map iframe{width:100%;height:100%;border:0;filter:invert(.92) hue-rotate(190deg)}
footer .foot-bot{border-top:1px solid rgba(255,255,255,.14);padding-top:24px;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,245,238,.5);flex-wrap:wrap;gap:12px}
@media (max-width:880px){footer .fgrid{grid-template-columns:1fr;gap:32px}footer{padding:56px 0 24px}}

/* ===== shop page ===== */
.page-hero{padding:50px 0 40px;border-bottom:1px solid var(--rule)}
.page-hero .eb{display:flex;align-items:center;gap:14px;color:var(--ink-60)}
.page-hero .eb .line{height:1px;width:40px;background:var(--ink-40)}
.page-hero h1{font-size:clamp(60px,8vw,120px);margin-top:18px;line-height:.92}
.page-hero h1 .em{color:var(--plum);font-style:italic;font-weight:300}
.page-hero .lede{max-width:560px;font-size:16px;color:var(--ink-60);margin-top:24px;line-height:1.6}

.filters{display:flex;gap:6px;padding:24px 0;border-bottom:1px solid var(--rule);overflow-x:auto;align-items:center}
.filters .lb{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-60);padding-right:18px;flex-shrink:0}
.chip{padding:8px 16px;border:1px solid var(--rule);border-radius:999px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-60);flex-shrink:0;transition:all .2s}
.chip.active{background:var(--plum);color:var(--cream);border-color:var(--plum)}
.chip:hover:not(.active){border-color:var(--plum);color:var(--plum)}

.category{padding:60px 0;border-bottom:1px solid var(--rule)}
.cat-hd{display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:36px;align-items:end}
.cat-hd .lft{display:flex;flex-direction:column;gap:10px}
.cat-hd .range{display:flex;align-items:center;gap:14px}
.cat-hd .range .dots{display:flex;gap:3px}
.cat-hd .range .dots .d{width:6px;height:6px;border-radius:50%;background:var(--rose)}
.cat-hd .title{font-family:var(--serif);font-size:56px;line-height:.95;letter-spacing:-.02em}
.cat-hd .title .em{color:var(--plum);font-style:italic;font-weight:300}
.cat-hd .desc{max-width:420px;color:var(--ink-60);font-size:13px}
.cat-hd .cta{display:flex;gap:10px;flex-wrap:wrap}

.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.prod{position:relative;background:var(--ivory);cursor:pointer}
.prod .ph{position:relative;overflow:hidden;aspect-ratio:3/4}
.prod .ph img{width:100%;height:100%;object-fit:cover;transition:transform .8s}
.prod:hover .ph img{transform:scale(1.05)}
.prod .meta{padding:14px 4px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.prod .name{font-family:var(--serif);font-size:20px;line-height:1.1}
.prod .name .it{font-style:italic;color:var(--plum-soft);font-weight:300}
.prod .price{font-family:var(--serif);font-size:17px;color:var(--plum);white-space:nowrap}
.prod .code{font-size:10px;letter-spacing:.2em;color:var(--ink-40);text-transform:uppercase;margin-top:4px}
.prod .badge{position:absolute;top:10px;left:10px;background:var(--cream);padding:5px 10px;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase}
.prod .heart{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(250,245,238,.94);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.prod:hover .heart{opacity:1}
.prod .heart svg{width:15px;height:15px;stroke:var(--plum);fill:none;stroke-width:1.6}
@media (max-width:880px){.prod-grid{grid-template-columns:repeat(2,1fr);gap:12px}.cat-hd{grid-template-columns:1fr}.cat-hd .title{font-size:40px}}

/* ===== about ===== */
.about-hero{position:relative;padding:40px 0 0}
.story{display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:80px 0;align-items:start}
.story .lead{font-family:var(--serif);font-size:clamp(28px,3vw,40px);line-height:1.25;font-weight:300;letter-spacing:-.01em}
.story .lead .em{color:var(--plum);font-style:italic}
.story .body{color:var(--ink);font-size:15px;line-height:1.75;display:flex;flex-direction:column;gap:18px}
.story .body .initial{font-family:var(--serif);font-size:64px;color:var(--plum);line-height:.8;float:left;padding:4px 12px 0 0}
.values{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.value{background:var(--cream);padding:44px 32px;display:flex;flex-direction:column;gap:14px}
.value .ico{width:44px;height:44px;border:1px solid var(--plum);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--plum);font-family:var(--serif);font-style:italic}
.value h3{font-family:var(--serif);font-size:28px;font-weight:400;margin-top:6px}
.value p{color:var(--ink-60);font-size:13px;line-height:1.65}
.timeline{padding:80px 0;border-top:1px solid var(--rule)}
.tl-rows{display:grid;grid-template-columns:1fr;gap:0}
.tl-row{display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:32px;padding:24px 0;border-bottom:1px solid var(--rule);align-items:center}
.tl-row .yr{font-family:var(--serif);font-size:30px;color:var(--plum)}
.tl-row .evt{font-family:var(--serif);font-size:22px;line-height:1.2}
.tl-row .note{color:var(--ink-60);font-size:13px}
.tl-row .loc{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-40);text-align:right}
@media (max-width:880px){.story{grid-template-columns:1fr;gap:30px;padding:40px 0}.values{grid-template-columns:1fr}.value{padding:28px 22px}.tl-row{grid-template-columns:60px 1fr;gap:16px}.tl-row .note,.tl-row .loc{grid-column:2}.tl-row .loc{text-align:left}}

.about-photos{display:grid;grid-template-columns:1.3fr 1fr 1fr;grid-template-rows:repeat(2,260px);gap:10px;padding:40px 0}
.about-photos .ap{overflow:hidden;background:var(--ivory)}
.about-photos .ap img{width:100%;height:100%;object-fit:cover}
.about-photos .ap.big{grid-row:span 2;grid-column:1}
@media (max-width:880px){.about-photos{grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,200px)}.about-photos .ap.big{grid-row:span 1;grid-column:span 2}}

/* ===== contact ===== */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:40px 0 0}
.contact-left{padding:40px 40px 40px 0;border-right:1px solid var(--rule)}
.contact-right{padding:40px 0 40px 40px}
.ci-row{display:grid;grid-template-columns:120px 1fr;gap:24px;padding:20px 0;border-bottom:1px solid var(--rule);align-items:flex-start}
.ci-row .lb{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-60);padding-top:4px}
.ci-row .val{font-family:var(--serif);font-size:22px;line-height:1.25}
.ci-row .val a{color:var(--plum);text-decoration:none;border-bottom:1px solid transparent;transition:border .2s}
.ci-row .val a:hover{border-color:var(--plum)}
.ci-row .val .mute{color:var(--ink-60);font-family:var(--sans);font-size:13px;display:block;margin-top:4px;letter-spacing:0;text-transform:none}
.hours{display:grid;grid-template-columns:1fr auto;gap:10px 24px;font-size:14px;padding-top:4px}
.hours .dy{color:var(--ink)}
.hours .hr{color:var(--ink-60);font-variant-numeric:tabular-nums}
.hours .dy.today{color:var(--plum);font-weight:500}
.hours .hr.today{color:var(--plum);font-weight:500}

.form{display:flex;flex-direction:column;gap:18px}
.form .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-60)}
.field input,.field textarea,.field select{background:transparent;border:0;border-bottom:1px solid var(--rule);padding:10px 0;font:inherit;color:var(--ink);font-size:15px;transition:border-color .2s;font-family:var(--sans)}
.field input:focus,.field textarea:focus,.field select:focus{outline:0;border-color:var(--plum)}
.field textarea{min-height:100px;resize:vertical}
.radio-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.radio-row label{padding:7px 14px;border:1px solid var(--rule);border-radius:999px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;color:var(--ink-60);font-family:var(--sans);transition:all .15s}
.radio-row label.on{border-color:var(--plum);color:var(--plum);background:rgba(74,31,92,.04)}
.radio-row input{display:none}
.submit{margin-top:12px}
.submit button{width:100%;background:var(--plum);color:var(--cream);padding:18px 20px;border-radius:2px;letter-spacing:.24em;text-transform:uppercase;font-size:12px;font-weight:500;transition:background .2s}
.submit button:hover{background:var(--plum-deep)}
.form-note{font-size:12px;color:var(--ink-60);text-align:center;margin-top:14px}
.form-sent{padding:40px 30px;border:1px solid var(--plum);text-align:center}
.form-sent h4{font-family:var(--serif);font-size:34px;color:var(--plum);margin-bottom:10px}
.form-sent p{color:var(--ink-60)}

.quick-contact{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding-top:28px}
.qc{padding:22px 18px;border:1px solid var(--rule);display:flex;flex-direction:column;gap:10px;transition:background .15s}
.qc:hover{background:var(--ivory);border-color:var(--plum)}
.qc .mt{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-60)}
.qc .mv{font-family:var(--serif);font-size:18px;color:var(--plum)}

.map-wide{aspect-ratio:21/9;background:var(--ivory);margin-top:40px;overflow:hidden;position:relative}
.map-wide iframe{width:100%;height:100%;border:0}
.map-overlay{position:absolute;left:32px;top:32px;background:var(--cream);padding:20px 24px;max-width:300px;box-shadow:0 30px 60px -30px rgba(0,0,0,.25)}
.map-overlay .eb{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--plum)}
.map-overlay h4{font-family:var(--serif);font-size:24px;margin-top:8px}
.map-overlay p{color:var(--ink-60);font-size:13px;margin-top:8px;line-height:1.5}

@media (max-width:880px){
  .contact-grid{grid-template-columns:1fr;padding:20px 0 0}
  .contact-left{padding:20px 0;border-right:0;border-bottom:1px solid var(--rule)}
  .contact-right{padding:30px 0}
  .quick-contact{grid-template-columns:1fr}
  .map-overlay{position:static;margin:-20px 16px 0;max-width:none}
  .map-wide{aspect-ratio:1/1;margin-top:0}
}

/* ===== feature (dekor / eventy hero photo) ===== */
.feature{padding:20px 0 40px}
.feature-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;align-items:stretch}
.feature-grid.reverse{grid-template-columns:1fr 1.1fr}
.feature-photo{position:relative;overflow:hidden;min-height:560px;background:var(--ivory)}
.feature-photo img{width:100%;height:100%;object-fit:cover;object-position:center}
.feature-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(42,20,50,.28) 100%);pointer-events:none}
.feature-tag{position:absolute;left:22px;top:22px;background:rgba(250,245,238,.92);backdrop-filter:blur(6px);padding:10px 16px;border-radius:999px;display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink)}
.feature-tag .live{width:6px;height:6px;border-radius:50%;background:#c94a6e;box-shadow:0 0 0 5px rgba(201,74,110,.18)}
.feature-side{display:flex;flex-direction:column;justify-content:space-between;padding:32px 0;gap:32px}
.feature-title{font-family:var(--serif);font-size:clamp(36px,4vw,52px);line-height:1;letter-spacing:-.01em;margin-top:10px;color:var(--ink)}
.feature-desc{color:var(--ink-60);font-size:15px;line-height:1.7;margin-top:16px;max-width:440px}
.feature-cta{display:flex;gap:10px;flex-wrap:wrap}
.kpi-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule);padding-top:20px}
.kpi-mini .kpi{padding-right:12px}
.kpi-mini .kpi .num{font-size:30px}
.kpi-mini .kpi .lb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-60);margin-top:2px}
@media (max-width:880px){
  .feature{padding:10px 0 20px}
  .feature-grid,.feature-grid.reverse{grid-template-columns:1fr;gap:20px}
  .feature-grid.reverse .feature-side{order:2}
  .feature-grid.reverse .feature-photo{order:1}
  .feature-photo{min-height:420px;aspect-ratio:4/5}
  .feature-side{padding:0 0 20px;gap:22px}
  .feature-title{font-size:30px}
  .feature-tag{left:14px;top:14px;padding:8px 12px;font-size:10px}
}

/* ===== page transitions ===== */
.page{animation:fade .4s ease-out}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== lightbox ===== */
.lightbox{position:fixed;inset:0;background:rgba(42,20,50,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:40px;animation:fade .3s}
.lightbox.open{display:flex}
.lightbox .inner{background:var(--cream);display:grid;grid-template-columns:1.2fr 1fr;max-width:1100px;width:100%;max-height:90vh;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.lightbox img{width:100%;height:100%;object-fit:cover;max-height:90vh}
.lightbox .info{padding:40px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.lightbox .info .eb{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--plum)}
.lightbox .info h3{font-family:var(--serif);font-size:42px;line-height:1;margin-top:6px}
.lightbox .info .price{font-family:var(--serif);font-size:34px;color:var(--plum)}
.lightbox .info .desc{color:var(--ink-60);line-height:1.65}
.lightbox .close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:22px}
.lightbox .specs{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;padding:20px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.lightbox .specs .lb{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-40)}
.lightbox .specs .vl{font-family:var(--serif);font-size:16px;margin-top:3px}
.lightbox .ord{display:flex;flex-direction:column;gap:10px}
.lightbox .btn-ord{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-radius:2px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;transition:all .2s}
.lightbox .btn-ord.primary{background:var(--plum);color:var(--cream)}
.lightbox .btn-ord.primary:hover{background:var(--plum-deep)}
.lightbox .btn-ord.wh{background:#25d366;color:#fff}
.lightbox .btn-ord.out{border:1px solid var(--rule);color:var(--ink)}
@media (max-width:880px){.lightbox{padding:0}.lightbox .inner{grid-template-columns:1fr;max-height:100vh;overflow-y:auto}.lightbox img{max-height:50vh;aspect-ratio:3/4}}

/* ===== utility ===== */
.hide-mob{display:block}
.show-mob{display:none}
@media (max-width:880px){.hide-mob{display:none}.show-mob{display:block}}
</style>
</head>
